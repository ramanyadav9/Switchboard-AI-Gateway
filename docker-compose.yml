services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    networks:
      - switchboard-net
    environment:
      - POSTGRES_DB=switchboard
      - POSTGRES_USER=switchboard
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-switchboard-db-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U switchboard"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    networks:
      - switchboard-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - APP_NAME=Switchboard API
      - APP_VERSION=1.0.0
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY:-change-this-to-a-random-64-char-string}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - DATABASE_URL=postgresql://switchboard:${POSTGRES_PASSWORD:-switchboard-db-secret}@postgres:5432/switchboard
      - REDIS_URL=redis://redis:6379
      - VLLM_LLM_BASE_URL=http://${GPU_SERVER_HOST:-host.docker.internal}:${VLLM_LLM_PORT:-8000}
      - VLLM_STT_BASE_URL=http://${GPU_SERVER_HOST:-host.docker.internal}:${VLLM_STT_PORT:-8004}
      - VLLM_TTS_BASE_URL=http://${GPU_SERVER_HOST:-host.docker.internal}:${VLLM_TTS_PORT:-8002}
      - SENSEVOICE_BASE_URL=http://${GPU_SERVER_HOST:-host.docker.internal}:${SENSEVOICE_PORT:-8006}
      - VLLM_API_KEY=${VLLM_API_KEY:-vaani-local-key}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-Qwen3-14B}
      - SEARXNG_URL=http://searxng:8080
      - CORS_ORIGINS=["*"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_URL:-}
    restart: unless-stopped
    networks:
      - switchboard-net
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      backend:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    networks:
      - switchboard-net
    ports:
      - "${GATEWAY_PORT:-41237}:41237"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend
      - frontend

  searxng:
    image: searxng/searxng
    restart: unless-stopped
    networks:
      - switchboard-net
    volumes:
      - ./config/searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - switchboard-net
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--save", "60", "100"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

networks:
  switchboard-net:
    driver: bridge

volumes:
  pgdata:
  redis-data:
  caddy-data:
  caddy-config:
