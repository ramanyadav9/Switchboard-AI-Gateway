services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    network_mode: host
    command: ["-p", "5433"]
    environment:
      - POSTGRES_DB=switchboard
      - POSTGRES_USER=switchboard
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-switchboard-db-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U switchboard -h ::1 -p 5433"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    network_mode: host
    environment:
      - APP_NAME=Switchboard API
      - APP_VERSION=1.0.0
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY:-change-this-to-a-random-64-char-string}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - DATABASE_URL=postgresql://switchboard:${POSTGRES_PASSWORD:-switchboard-db-secret}@[::1]:5433/switchboard
      - VLLM_LLM_BASE_URL=http://localhost:8000
      - VLLM_STT_BASE_URL=http://localhost:8004
      - VLLM_TTS_BASE_URL=http://localhost:8002
      - VLLM_API_KEY=${VLLM_API_KEY:-vaani-local-key}
      - DEFAULT_MODEL=Qwen3-14B
      - SEARXNG_URL=http://localhost:8888
      - CORS_ORIGINS=["*"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://[::1]:8081/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_URL:-}
    restart: unless-stopped
    network_mode: host
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      backend:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend
      - frontend

  searxng:
    image: searxng/searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - ./config/searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    network_mode: host
    command: ["redis-server", "--port", "6380", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--save", "60", "100"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6380", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  pgdata:
  redis-data:
  caddy-data:
  caddy-config:
