services:
  backend:
    build: ./backend
    restart: unless-stopped
    network_mode: host
    environment:
      - APP_NAME=Switchboard API
      - APP_VERSION=1.0.0
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY:-change-this-to-a-random-64-char-string}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - DATABASE_URL=sqlite:///./switchboard.db
      - VLLM_LLM_BASE_URL=http://localhost:8000
      - VLLM_STT_BASE_URL=http://localhost:8004
      - VLLM_TTS_BASE_URL=http://localhost:8002
      - VLLM_API_KEY=${VLLM_API_KEY:-vaani-local-key}
      - DEFAULT_MODEL=Qwen3-14B
      - CORS_ORIGINS=["*"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ""
    restart: unless-stopped
    network_mode: host
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      backend:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend
      - frontend

volumes:
  caddy-data:
  caddy-config:
